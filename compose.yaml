services:
  api:
    container_name: url-to-file
    build:
      context: .
      target: development
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
  rabbitmq:
    image: rabbitmq:4-management
    ports: ["5672:5672", "15672:15672"]
    env_file:
      - ..env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq # Data persistence
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
    restart: unless-stopped
volumes:
  rabbitmq_data: