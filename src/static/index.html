<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  
  <script type="module">
    // @alias main()
    async function startDownloadFile() {
      const jobId = await downloadFile();
      
      await startPolling(jobId);
    }

    async function downloadFile() {
      const url = new URL("http://localhost:8081/download-file");
      
      url.searchParams.append("file-name", "example.png");
      url.searchParams.append("source-url", encodeURI("https://www.tycsports.com/"));

      const res = await fetch(url.toString());
      const resData = await res.json();
      const jobId = resData?.jobId || "";

      return jobId;
    };

    async function startPolling(jobId, timeout=5000) {
      if (jobId) {
        try {
          const url = new URL(`http://localhost:8081/download-file/status/${jobId}`);

          // polling at incremental intervals. After 3 times, fails.
          const res = await fetch(url);
          const data = await res.json();
console.log(data)
          if (data) {
            const {status, fileName, fileUrl, jobId} = data;
            
            if (status === 'done') {
              openFile(fileUrl);
            }
            if (status === 'error') {
              console.error("Failed to download the file ", fileName, ".");
            }
            if (status === 'pending' || 'progress') {
              if (timeout <= 20_000) {
                setTimeout(async () => await startPolling(jobId, timeout*2), timeout);
              } else {
                console.error("Timeout. Failed to download the file (", fileName, ")");
              }
            }
          }
        } catch (error) {
          console.error(error)
        }
      } else {
        console.error("Cannot download the file. Missing job id.");
      }
    }

    function openFile(fileUrl) {
      if (fileUrl) {
        window.open(fileUrl, "_blank");
        ws.close();
      } else {
        console.error("Cannot open the file. Missing file url.");
      }
    }

    document.querySelector("button#download")?.addEventListener("click", startDownloadFile);
  </script>
</head>
<body>
  <button id="download">Download File</button>
</body>
</html>
